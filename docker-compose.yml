services:
  postgres:
    # Hardened postgres:17-alpine — gosu (permanent trivy CRITICAL) replaced
    # with su-exec, numeric USER 70 for Kubernetes runAsNonRoot. See
    # docker/postgres.Dockerfile.
    image: mittal122/ai-trading-postgres:17-alpine-r1
    build:
      context: .
      dockerfile: docker/postgres.Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trading}
      # No default — compose fails loudly if POSTGRES_PASSWORD is unset,
      # rather than silently booting the DB with a guessable credential.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-trading}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # NOT published to the host — the DB is reachable only over the internal
    # compose network by the backend. Uncomment (bound to loopback) only for
    # local debugging: # ports: ["127.0.0.1:5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trading}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    # Published image — a machine without the source code just pulls this.
    # TAG pins the release (never bare "latest" in production).
    image: mittal122/ai-trading-backend:${TAG:-v1.0.6}
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-trading}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-trading}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      # Generate with: python -c 'import secrets; print(secrets.token_urlsafe(48))'
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      # Lock the money-critical endpoints (exchange keys, live trading,
      # mass-delete) on a deployed instance. Leave unset for single-operator.
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:-}
      DEBUG_ERRORS: ${DEBUG_ERRORS:-false}
      GLOBAL_RATE_LIMIT: ${GLOBAL_RATE_LIMIT:-240/minute}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY}
      NVIDIA_NIM_BASE_URL: ${NVIDIA_NIM_BASE_URL:-https://integrate.api.nvidia.com/v1}
      MARKET_ANALYST_MODEL: ${MARKET_ANALYST_MODEL:-nvidia/nemotron-3-super-120b-a12b}
      STRATEGY_SELECTOR_MODEL: ${STRATEGY_SELECTOR_MODEL:-zai-org/glm-5.1}
      TRADE_VALIDATOR_MODEL: ${TRADE_VALIDATOR_MODEL:-deepseek-ai/deepseek-v4-pro}
      RISK_MANAGER_MODEL: ${RISK_MANAGER_MODEL:-zai-org/glm-5.1}
      SENTIMENT_ANALYZER_MODEL: ${SENTIMENT_ANALYZER_MODEL:-minimaxai/minimax-m3}
      CHAT_ASSISTANT_MODEL: ${CHAT_ASSISTANT_MODEL:-moonshotai/kimi-k2.5}
      BACKTEST_EXPLAINER_MODEL: ${BACKTEST_EXPLAINER_MODEL:-minimaxai/minimax-m2.7}
      BINANCE_API_KEY: ${BINANCE_API_KEY:-}
      BINANCE_SECRET: ${BINANCE_SECRET:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_PRO: ${STRIPE_PRICE_PRO:-}
      STRIPE_PRICE_ENTERPRISE: ${STRIPE_PRICE_ENTERPRISE:-}
      # Kronos (AI price forecast) is off by default in Docker — the default
      # image ships without torch. To enable: rebuild the backend with
      # --build-arg INSTALL_KRONOS=true and set KRONOS_ENABLED=true in .env.
      KRONOS_ENABLED: ${KRONOS_ENABLED:-false}
      KRONOS_PATH: /kronos
      DEFAULT_MODEL: ${DEFAULT_MODEL:-NeoQuasar/Kronos-small}
      DEFAULT_TOKENIZER: ${DEFAULT_TOKENIZER:-NeoQuasar/Kronos-Tokenizer-base}
      DEFAULT_SYMBOL: ${DEFAULT_SYMBOL:-BTCUSDT}
      DEFAULT_INTERVAL: ${DEFAULT_INTERVAL:-5m}
      DEFAULT_LOOKBACK: ${DEFAULT_LOOKBACK:-400}
      DEFAULT_PRED_LEN: ${DEFAULT_PRED_LEN:-24}
    volumes:
      - ${KRONOS_PATH_HOST:-./kronos}:/kronos:ro
    # NOT published to the host — nginx (frontend) is the only entrypoint and
    # reaches the backend over the internal network. Publishing 8000 would
    # bypass the reverse proxy and its security headers.

  frontend:
    image: mittal122/ai-trading-frontend:${TAG:-v1.0.6}
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    # Host 80 → container's unprivileged nginx on 8080.
    ports:
      - "80:8080"

volumes:
  postgres_data:
