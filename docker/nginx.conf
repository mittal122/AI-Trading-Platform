server {
    # Unprivileged nginx listens on 8080 (no root / cap_net_bind needed);
    # the host port mapping in docker-compose.yml exposes it as 80.
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compress the SPA bundle + API JSON — the Vite JS bundle is the single
    # largest transfer and compresses ~3-4x. woff2 fonts are pre-compressed,
    # so they're deliberately absent from gzip_types.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Baseline security headers on everything nginx serves (the SPA shell +
    # proxied API responses). TLS is expected to terminate at an upstream
    # load balancer / reverse proxy in production — add HSTS there.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # CSP for the SPA: self-hosted assets only, connect back to same origin
    # (API is same-origin via the /api proxy below). lightweight-charts and
    # the app use no external CDNs, so this is deliberately tight.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        # Resolve "backend" lazily at request time. A literal proxy_pass
        # hostname is resolved at STARTUP and nginx refuses to boot when it
        # doesn't exist yet — which crash-loops the frontend pod on Kubernetes
        # until a Service named "backend" appears. With a variable + resolver,
        # nginx always starts; /api just 502s until the backend is deployed.
        # Two resolvers cover both runtimes: 127.0.0.11 = Docker's embedded
        # DNS (compose), 10.96.0.10 = kube-dns ClusterIP (default service
        # CIDR; kind/k3s/kubeadm default). (`resolver local=on` would be
        # cleaner but this nginx build rejects it.)
        resolver 127.0.0.11 10.96.0.10 valid=10s ipv6=off;
        resolver_timeout 3s;
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 300s;
    }
}
